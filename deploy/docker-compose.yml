###############################################################################
# RayNet Data Infrastructure — MinIO Object Storage
#
# Provides S3-compatible storage for MosaicML Streaming shards.
# Remote clients (Colab, cloud VMs) connect to stream training data.
#
# Usage:
#   cp .env.example .env        # edit credentials
#   docker compose up -d        # start stack
#   ./setup_minio.sh            # create buckets (first time only)
#
# Then upload shards:
#   python -m RayNet.streaming.minio_utils upload \
#       --shard_dir ./mds_shards/train --bucket gazegene --prefix train
###############################################################################

services:

  # =========================================================================
  # MinIO — S3-compatible object storage
  # =========================================================================
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: raynet-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"       # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # MinIO Client (mc) — One-shot bucket initialization
  # =========================================================================
  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: raynet-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set raynet http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing raynet/${MINIO_BUCKET:-gazegene} &&
        mc anonymous set download raynet/${MINIO_BUCKET:-gazegene} &&
        echo 'Bucket ${MINIO_BUCKET:-gazegene} ready' &&
        exit 0
      "

  # =========================================================================
  # Nginx reverse proxy (optional) — TLS termination for remote access
  # =========================================================================
  # Uncomment if you need HTTPS for external clients.
  # Place certs in ./certs/fullchain.pem and ./certs/privkey.pem
  #
  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: raynet-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - minio

volumes:
  minio_data:
    driver: local
